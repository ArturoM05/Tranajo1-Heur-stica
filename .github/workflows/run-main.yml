name: Ejecutar main.py

on:
  workflow_dispatch:

jobs:
  run-algoritmo:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    strategy:
      fail-fast: false
      matrix:
        algo:
          - constructivo
          - grasp
          - sa

    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install openpyxl

      - name: Ejecutar algoritmo ${{ matrix.algo }}
        env:
          ALGO: ${{ matrix.algo }}
        run: |
          python -u main.py 2>&1 | tee output_${{ matrix.algo }}.log

      - name: Subir resultados (${{ matrix.algo }})
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: resultados-${{ matrix.algo }}
          path: |
            output_${{ matrix.algo }}.log
            *.xlsx
          if-no-files-found: warn
